name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,stats,analysis]"

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src || true

      - name: Test keyless loop
        # No credentials are configured, so this exercises the synthetic fixture
        # path and the deterministic agent and judge end to end.
        run: pytest -q --cov=ombench --cov-report=term-missing
