# Curated knowledge base seed for the benchmark.
#
# These are the durable memory items a team would have compiled from history. The
# backtest mounts them for the with-memory condition. Each item is the kind of
# durable context that is not reliably inferable from the current app snapshot, which
# is what makes the paired tasks fair tests of memory.
