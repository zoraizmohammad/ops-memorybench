<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="SEQUENCE" height="451px" preserveAspectRatio="none" style="width:1073px;height:451px;background:#FFFFFF;" version="1.1" viewBox="0 0 1073 451" width="1073px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="6"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="628.209" x="218.9626" y="25.7803">Bitemporal reconstruction: S(T, tau) = fold(S0, { e | valid_at(e) &lt;= T and ingested_at(e) &lt;= tau })</text></g><g class="participant-lifeline" data-entity-uid="part1" data-qualified-name="bt" data-source-line="8" id="part1-lifeline"><g><title>Backtest</title><rect fill="#000000" fill-opacity="0.00000" height="285" width="8" x="34.8447" y="100"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="38" x2="38" y1="100" y2="385"/></g></g><g class="participant-lifeline" data-entity-uid="part2" data-qualified-name="es" data-source-line="9" id="part2-lifeline"><g><title>EventStore.materialize</title><rect fill="#000000" fill-opacity="0.00000" height="285" width="8" x="422.3433" y="100"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="425.9229" x2="425.9229" y1="100" y2="385"/></g></g><g class="participant-lifeline" data-entity-uid="part3" data-qualified-name="log" data-source-line="10" id="part3-lifeline"><g><title>Event log</title><rect fill="#000000" fill-opacity="0.00000" height="285" width="8" x="828.6245" y="100"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="832.4385" x2="832.4385" y1="100" y2="385"/></g></g><g class="participant participant-head" data-entity-uid="part1" data-qualified-name="bt" data-source-line="8" id="part1-head"><rect fill="#E2E2F0" height="28" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="67.6895" x="5" y="71"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.6895" x="12" y="88.7803">Backtest</text></g><g class="participant participant-tail" data-entity-uid="part1" data-qualified-name="bt" data-source-line="8" id="part1-tail"><rect fill="#E2E2F0" height="28" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="67.6895" x="5" y="384"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.6895" x="12" y="401.7803">Backtest</text></g><g class="participant participant-head" data-entity-uid="part2" data-qualified-name="es" data-source-line="9" id="part2-head"><rect fill="#E2E2F0" height="28" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="154.8408" x="348.9229" y="71"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.8408" x="355.9229" y="88.7803">EventStore.materialize</text></g><g class="participant participant-tail" data-entity-uid="part2" data-qualified-name="es" data-source-line="9" id="part2-tail"><rect fill="#E2E2F0" height="28" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="154.8408" x="348.9229" y="384"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.8408" x="355.9229" y="401.7803">EventStore.materialize</text></g><g class="participant participant-head" data-entity-uid="part3" data-qualified-name="log" data-source-line="10" id="part3-head"><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3721" x="800.4385" y="96.7803">Event log</text><path d="M814.6245,50 C814.6245,40 832.6245,40 832.6245,40 C832.6245,40 850.6245,40 850.6245,50 L850.6245,76 C850.6245,86 832.6245,86 832.6245,86 C832.6245,86 814.6245,86 814.6245,76 L814.6245,50" fill="#E2E2F0" style="stroke:#181818;stroke-width:0.5;"/><path d="M814.6245,50 C814.6245,60 832.6245,60 832.6245,60 C832.6245,60 850.6245,60 850.6245,50" fill="none" style="stroke:#181818;stroke-width:0.5;"/></g><g class="participant participant-tail" data-entity-uid="part3" data-qualified-name="log" data-source-line="10" id="part3-tail"><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3721" x="800.4385" y="394.7803">Event log</text><path d="M814.6245,408 C814.6245,398 832.6245,398 832.6245,398 C832.6245,398 850.6245,398 850.6245,408 L850.6245,434 C850.6245,444 832.6245,444 832.6245,444 C832.6245,444 814.6245,444 814.6245,434 L814.6245,408" fill="#E2E2F0" style="stroke:#181818;stroke-width:0.5;"/><path d="M814.6245,408 C814.6245,418 832.6245,418 832.6245,418 C832.6245,418 850.6245,418 850.6245,408" fill="none" style="stroke:#181818;stroke-width:0.5;"/></g><path d="M603,115 L603,164 L1062,164 L1062,125 L1052,115 L603,115" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1052,115 L1052,125 L1062,125 L1052,115" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="312.0254" x="609" y="130.0103">e1  valid_at=May 1   ingested_at=May 1   "start 09:00"</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="405.5835" x="609" y="143.0103">e2  valid_at=May 1   ingested_at=May 9   "late backfill"   &lt;- arrived late</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="438.1343" x="609" y="156.0103">e3  valid_at=May 20  ingested_at=May 20  "start 15:00"     &lt;- the reschedule</text><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="18" id="msg1"><polygon fill="#181818" points="414.3433,184,424.3433,188,414.3433,192,418.3433,188" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="38.8447" x2="420.3433" y1="188" y2="188"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="318.6714" x="45.8447" y="183.0103">materialize(as_of_valid=May 14, as_of_ingest=May 14)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="19" id="msg2"><polygon fill="#181818" points="820.6245,211,830.6245,215,820.6245,219,824.6245,215" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="426.3433" x2="826.6245" y1="215" y2="215"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="382.2813" x="433.3433" y="210.0103">fold events where valid_at &lt;= May 14 AND ingested_at &lt;= May 14</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" data-source-line="20" id="msg3"><polygon fill="#181818" points="437.3433,264,427.3433,268,437.3433,272,433.3433,268" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="431.3433" x2="831.6245" y1="268" y2="268"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="41.9199" x="443.3433" y="237.0103">e1 only</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="241.3633" x="443.3433" y="250.0103">(e2 excluded: not yet ingested by May 14)</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="206.667" x="443.3433" y="263.0103">(e3 excluded: valid_at after May 14)</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" data-source-line="21" id="msg4"><polygon fill="#181818" points="49.8447,304,39.8447,308,49.8447,312,45.8447,308" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="43.8447" x2="425.3433" y1="308" y2="308"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="104.4253" x="55.8447" y="290.0103">state.start = 09:00</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="363.4985" x="55.8447" y="303.0103">(honest: no leakage of the late backfill or the future reschedule)</text></g><path d="M43,321 L43,370 L336,370 L336,331 L326,321 L43,321" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M326,321 L326,331 L336,331 L326,321" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="242.8169" x="49" y="336.0103">A single event time would have leaked e2,</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="244.2832" x="49" y="349.0103">inflating what the agent appeared to know.</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="272.397" x="49" y="362.0103">The ingest axis is what makes the backtest fair.</text><?plantuml-src ZLHDRnf13BtFhtZYKf004T8UWaAbf1_gfRaGgPTAoB1UTiGmWsQy4Fhnt-lP9MJJNdf2Q_izFp-FUODlrGbo312xOz0J9-mZ7zWBLhJU2YU1OzhIXiScRQtVKwHTazl4KFlYGt0XubXPuKw-u99g9v-3bmTIuY_i3YnsJPsQL54HZjPlK99BR8nOSOnxPThjGoI7oElWayHwBJRu6HRzno64wW7cA8Ch-el943_1-8K3ELiiIVeymEqSZo1VGBbLFtVY2iRlWJ6gGDNOFUcSlVlpe3rGmafU9pzbBnOI8ezt91ojDlh1JIadKv3GYXAVw-32fadfhp4-22CSE3QV05_XedF-bKxGxwx6IwoNH2LWSZERJ7ePEFqFu4q6EfNOBAUqplKqSZi2nMWFN23dCjdrNsJJoRzaENPMSVKkgm1QCgbOrvBM5HUrOyFgSXxJc9LWz5ujmGmTd_gKbg5SDlrQvM-7Q6DjotDmO1IfU3LA2V9kqJp2f2-B8ry4vnss2DmzVEpAVicOJ39w5gEc1-zEttrVNUIdjQiBBcPPD4ui5mQiJcVu89TUTqellQdKkT0Lh4rqxXdKAU5nwzUytPkoLC4hT-xrV488PUFWgpL1xoS7orhgs7LtS7v2qMugoL1zcy0TaehMGscljBdROwZLiOeEt7JISNWwD7cjfRRA9tQiT83SHLKeYlPxfgXr4h3ruJZMuaVDjdRe_u1DiAb5xPGmDTZBFq99DevVbly7?></g></svg>